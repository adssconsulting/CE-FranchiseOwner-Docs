site_name: CE FranchiseOwner Help
site_url: https://adssconsulting.github.io/CE-FranchiseOwner-Docs
site_description: >-
  CE FranchiseOwner documentation has moved into the application
  (Help & Docs). This site is retained only as a placeholder.
site_author: Commission Express of South Carolina
copyright: >-
  &copy; Commission Express of South Carolina

repo_name: adssconsulting/CE-FranchiseOwner-Docs
repo_url: https://github.com/adssconsulting/CE-FranchiseOwner-Docs

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - toc.integrate

nav:
  - Home: index.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
