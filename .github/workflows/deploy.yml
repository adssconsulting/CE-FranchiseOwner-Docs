name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches:
      - main
  # Manual trigger from the Actions tab for the rare case the deploy
  # needs to be re-run without a source change.
  workflow_dispatch:

permissions:
  contents: write   # mkdocs gh-deploy pushes to the gh-pages branch

concurrency:
  group: docs-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # gh-deploy needs full history

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          cache: pip

      - name: Install MkDocs Material
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs-material

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Deploy to gh-pages
        run: mkdocs gh-deploy --force --clean --verbose
